name: Publish

# 通过 GitHub Actions + npm Trusted Publishing（OIDC）发布到 npm，
# 无需 NPM_TOKEN，鉴权与 provenance（来源证明绿勾）都由 OIDC 完成。
#
# 一次性准备（只需做一次，在 npmjs.com 上）：
#   stock-sdk 包 → Settings → Trusted Publisher → 添加 GitHub Actions：
#     - Organization or user: chengzuopeng
#     - Repository:           stock-sdk
#     - Workflow filename:    release.yml
#     - Environment:          （留空）
#
# 发布流程：bump 版本并打 tag，例如
#   git tag v1.10.1 && git push origin v1.10.1
# 即触发本流水线自动发布。

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Trusted Publishing 鉴权 + provenance 签名的关键权限

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      # Trusted Publishing 需要 npm >= 11.5.0；Node 20 自带的是 npm 10.x，需升级
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck, test & build
        run: |
          pnpm typecheck
          pnpm build
          pnpm test

      # provenance 由 package.json 的 publishConfig.provenance: true 自动开启；
      # 安装/构建用 pnpm，发布仍用 npm publish（走 npm 的 provenance 链路）。
      # dist-tag：prerelease 版本（含 -beta/-rc/-alpha）发到对应 tag，避免被标成 latest 顶掉
      # 稳定版——用户用 `npm i stock-sdk@beta` 安装，`npm i stock-sdk` 仍取 latest 稳定版。
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          case "$VERSION" in
            *-beta*)  TAG=beta ;;
            *-rc*)    TAG=rc ;;
            *-alpha*) TAG=alpha ;;
            *-*)      TAG=next ;;
            *)        TAG=latest ;;
          esac
          echo "Publishing $VERSION with dist-tag: $TAG"
          npm publish --access public --tag "$TAG"
